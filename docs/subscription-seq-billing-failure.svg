<rect x="46" y="628" width="878" height="26" rx="5" fill="#fffde7" stroke="#f9a825" stroke-width="1"/>
<text x="485" y="645" font-size="10.5" fill="#795548" text-anchor="middle">猶予期間中のアクセス維持と支払い更新導線が解約防止の要（UX設計ガイド 第10章参照）</text>
