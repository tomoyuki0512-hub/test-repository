<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 578" width="100%" style="max-width:780px;font-family:'Helvetica Neue',Arial,'Hiragino Sans','Noto Sans JP',sans-serif">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#37474f"/></marker><marker id="ad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#78909c"/></marker></defs>
<rect x="0" y="0" width="780" height="578" fill="#ffffff"/>
<text x="390" y="26" font-size="16" font-weight="bold" fill="#263238" text-anchor="middle">③ サーバー通知（Webhook）受信フロー</text>
<text x="390" y="44" font-size="11" fill="#607d8b" text-anchor="middle">iOS: App Store Server Notifications V2 ／ Android: RTDN（Cloud Pub/Sub push）</text>
<line x1="105" y1="96" x2="105" y2="554" stroke="#cfd8dc" stroke-width="1.2" stroke-dasharray="4 4"/>
<line x1="295" y1="96" x2="295" y2="554" stroke="#cfd8dc" stroke-width="1.2" stroke-dasharray="4 4"/>
<line x1="485" y1="96" x2="485" y2="554" stroke="#cfd8dc" stroke-width="1.2" stroke-dasharray="4 4"/>
<line x1="675" y1="96" x2="675" y2="554" stroke="#cfd8dc" stroke-width="1.2" stroke-dasharray="4 4"/>
<rect x="30" y="50" width="150" height="46" rx="10" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1.8"/>
<text x="105" y="71" font-size="12" font-weight="bold" fill="#0d47a1" text-anchor="middle">ストア</text>
<text x="105" y="86" font-size="10" fill="#0d47a1" text-anchor="middle">(App Store / Play)</text>
<rect x="220" y="50" width="150" height="46" rx="10" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.8"/>
<text x="295" y="71" font-size="12" font-weight="bold" fill="#bf360c" text-anchor="middle">自前バックエンド</text>
<text x="295" y="86" font-size="10" fill="#bf360c" text-anchor="middle">(Webhook受信)</text>
<rect x="410" y="50" width="150" height="46" rx="10" fill="#eceff1" stroke="#78909c" stroke-width="1.8"/>
<text x="485" y="78" font-size="12.5" font-weight="bold" fill="#37474f" text-anchor="middle">DB</text>
<rect x="600" y="50" width="150" height="46" rx="10" fill="#e8f5e9" stroke="#43a047" stroke-width="1.8"/>
<text x="675" y="78" font-size="12.5" font-weight="bold" fill="#1b5e20" text-anchor="middle">Flutterアプリ</text>
<text x="200" y="147" font-size="11" fill="#37474f" text-anchor="middle">POST（iOS: JWS / Android: Pub/Sub push）</text>
<line x1="105" y1="154" x2="295" y2="154" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>
<path d="M295,178 C351,178 351,200 301,200" fill="none" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>
<text x="359" y="186" font-size="11" fill="#37474f">署名検証（JWS証明書チェーン / Bearer Token）</text>
<text x="390" y="233" font-size="11" fill="#37474f" text-anchor="middle">subscription_events に生ペイロードをINSERT</text>
<line x1="295" y1="240" x2="485" y2="240" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>
<text x="200" y="273" font-size="11" fill="#78909c" text-anchor="middle">200 OK（即時応答。重い処理は後段に回す）</text>
<line x1="295" y1="280" x2="105" y2="280" stroke="#78909c" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ad)"/>
<text x="200" y="313" font-size="11" fill="#37474f" text-anchor="middle">最新ステータスを照会（通知を鵜呑みにしない）</text>
<line x1="295" y1="320" x2="105" y2="320" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>
<text x="200" y="353" font-size="11" fill="#78909c" text-anchor="middle">最新の状態・有効期限</text>
<line x1="105" y1="360" x2="295" y2="360" stroke="#78909c" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ad)"/>
<text x="390" y="393" font-size="11" fill="#37474f" text-anchor="middle">subscriptions.status を更新（冪等）</text>
<line x1="295" y1="400" x2="485" y2="400" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>
<rect x="30" y="412" width="720" height="26" rx="4" fill="#eceff1"/>
<text x="390" y="429" font-size="11.5" font-weight="bold" fill="#455a64" text-anchor="middle">―― 以降、アプリは起動時・フォアグラウンド復帰時に最新状態を取得 ――</text>
<text x="485" y="467" font-size="11" fill="#37474f" text-anchor="middle">GET /me/subscription</text>
<line x1="675" y1="474" x2="295" y2="474" stroke="#37474f" stroke-width="1.6" marker-end="url(#a)"/>
<text x="485" y="507" font-size="11" fill="#78909c" text-anchor="middle">最新の権利（status・期限）</text>
<line x1="295" y1="514" x2="675" y2="514" stroke="#78909c" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ad)"/>
<rect x="46" y="526" width="688" height="26" rx="5" fill="#fffde7" stroke="#f9a825" stroke-width="1"/>
<text x="390" y="543" font-size="10.5" fill="#795548" text-anchor="middle">通知は重複・順不同・欠落があり得る。必ず照会APIで状態を確定させ、DBを「正」とする</text>
</svg>
