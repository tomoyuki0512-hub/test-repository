<!-- Mermaid 図の描画対応: ```mermaid コードブロックを図としてレンダリングする -->
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

  // Jekyll(kramdown/Rouge)は ```mermaid を <pre><code class="language-mermaid"> に変換するため、
  // mermaid.js が認識できる <div class="mermaid"> に置き換えてから描画する
  document.querySelectorAll("pre > code.language-mermaid, pre.highlight > code.language-mermaid, div.language-mermaid pre code").forEach((el) => {
    const target = el.closest("div[class*='language-mermaid']") || el.closest("pre");
    const div = document.createElement("div");
    div.className = "mermaid";
    div.textContent = el.textContent;
    target.replaceWith(div);
  });

  mermaid.initialize({ startOnLoad: false, theme: "default" });
  await mermaid.run({ querySelector: ".mermaid" });
</script>
